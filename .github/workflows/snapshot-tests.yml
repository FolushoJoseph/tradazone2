name: Snapshot Tests

on:
  pull_request:
    branches: [main]

jobs:
  smart-snapshot-selection:
    runs-on: ubuntu-latest
    outputs:
      snapshot-files: ${{ steps.selection.outputs.snapshot-files }}
      count: ${{ steps.selection.outputs.count }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Select relevant snapshot tests
        id: selection
        run: |
          # Use CI filtering to select only snapshot tests related to changes
          node -e "
            const Utils = require('./scripts/ci-pipeline-utils.js');
            const utils = new Utils();
            
            // Get all snapshot tests
            const allTests = utils.discoverTestFiles();
            const snapshotTests = utils.filterByTestType(allTests, 'snapshot');
            
            // Try to filter by changes, but include all snapshots if no clear mapping
            const changed = utils.getChangedFiles('main');
            const relevant = changed.length > 0 
              ? utils.filterByChangedFiles(snapshotTests, changed)
              : snapshotTests;
            
            // Use all snapshots if no direct mapping found (safety)
            const tests = relevant.length > 0 ? relevant : snapshotTests;
            
            console.log('Snapshot tests selected: ' + tests.length);
            console.log(tests.join('\n'));
            
            console.log('\n📊 Selection metadata:');
            console.log('  Total snapshot tests: ' + snapshotTests.length);
            console.log('  Changed files: ' + changed.length);
            console.log('  Selected tests: ' + tests.length);
          " > snapshot-selection.txt
          
          # Read selection into output
          SNAPSHOT_FILES=$(cat snapshot-selection.txt | grep 'src/test' | tr '\n' ' ')
          COUNT=$(grep "Snapshot tests selected:" snapshot-selection.txt | head -1 | grep -oE '[0-9]+' | tail -1)
          
          echo "snapshot-files=${SNAPSHOT_FILES}" >> $GITHUB_OUTPUT
          echo "count=${COUNT}" >> $GITHUB_OUTPUT
          
          cat snapshot-selection.txt

  snapshot-tests:
    needs: smart-snapshot-selection
    name: Run snapshot tests (Issue #156)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # This repo does not commit npm/yarn lockfiles, so npm ci and npm cache
        # setup cannot run on GitHub Actions.
        run: npm install --legacy-peer-deps


      - name: Build project
        run: npm run build

      # Issue #156: Auth module snapshot tests (AuthComponents.snapshot.test.jsx)
      # are picked up automatically by vitest alongside all other snapshot suites.
      - name: Run snapshot tests (includes Auth module — Issue #156)
        run: |
          echo "🔍 Running snapshot tests..."
          SNAPSHOT_FILES="${{ needs.smart-snapshot-selection.outputs.snapshot-files }}"
          
          if [ -z "$SNAPSHOT_FILES" ]; then
            echo "⚠️  No snapshot files selected, running default snapshot detection"
            npm test -- --reporter=verbose $(find src/test -name "*.snapshot.test.*" -print)
          else
            echo "📸 Running selected snapshot tests:"
            npm test -- --reporter=verbose $SNAPSHOT_FILES
          fi


      - name: Check for snapshot changes
        run: |
          echo "📸 Checking for snapshot changes..."
          if git diff --name-only | grep -q "__snapshots__"; then
            echo "❌ Snapshot files have changed!"
            echo ""
            echo "Changed snapshot files:"
            git diff --name-only | grep "__snapshots__"
            echo ""
            echo "Please review the snapshot changes and commit them if they are intentional."
            echo "To update snapshots locally, run: npm test -- --update"
            
            # Generate snapshot change report
            echo "## Snapshot Changes Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following snapshots were modified:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            git diff --name-only | grep "__snapshots__" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            
            exit 1

          else
            echo "✅ No snapshot changes detected"
          fi
        shell: bash

      - name: Generate snapshot test report
        if: always()
        run: |
          npm run ci:report markdown > snapshot-report.md
          echo "## Snapshot Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          tail -20 snapshot-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: snapshot-changes
          path: |
            src/**/__snapshots__/
            snapshot-report.md
          retention-days: 7
